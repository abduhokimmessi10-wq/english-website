{% load static %}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}IELTS Speaking Practice{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --surface:#0f0f1a;
  --surface2:#161624;
  --surface3:#1e1e2e;
  --border:#252538;
  --border2:#303048;
  --violet:#7c6ef5;
  --violet2:#a394f8;
  --violet-bg:#1a1730;
  --violet-soft:#252248;
  --green:#34d399;
  --green-bg:#0a2018;
  --green-border:rgba(52,211,153,0.2);
  --blue:#60a5fa;
  --blue-bg:#0a1628;
  --blue-border:rgba(96,165,250,0.2);
  --red:#f87171;
  --red-bg:#200a0a;
  --red-border:rgba(248,113,113,0.2);
  --amber:#fbbf24;
  --amber-bg:#1a1400;
  --text1:#eeeeff;
  --text2:#9090b0;
  --text3:#505068;
  --r:16px;--r2:12px;--r3:8px;
}
body{background:var(--bg);color:var(--text1);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* nav */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,8,16,0.92);backdrop-filter:blur(12px);z-index:50}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:34px;height:34px;background:var(--violet);border-radius:10px;display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-size:16px;font-weight:600;color:var(--text1);letter-spacing:-0.3px}
.nav-logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-link{padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s;border:1px solid transparent}
.nav-link:hover{color:var(--text1);background:var(--surface2);border-color:var(--border)}
.nav-link.active{color:var(--violet2);background:var(--violet-bg);border-color:var(--violet-soft)}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,110,245,0.3),transparent)}

/* btn */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:var(--r2);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--violet);color:#fff}
.btn-primary:hover{background:#8f82f6}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface3);color:var(--text1)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text1)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-lg{padding:14px 28px;font-size:15px}
.btn-sm{padding:7px 14px;font-size:12px}

/* badge */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-violet{background:var(--violet-bg);color:var(--violet2);border:1px solid var(--violet-soft)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(251,191,36,0.2)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 22px;font-size:13px;color:var(--text2);opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}
.toast.error{border-color:var(--red-border);color:var(--red);background:var(--red-bg)}

/* spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(124,110,245,0.3);border-top-color:var(--violet);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2L14 5V11L8 14L2 11V5L8 2Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="nav-logo-text">SpeakAI</div>
      <div class="nav-logo-sub">IELTS Speaking Practice</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Home</a>
    <a href="/practice/1/" class="nav-link {% block nav_p1 %}{% endblock %}">Part 1</a>
    <a href="/practice/2/" class="nav-link {% block nav_p2 %}{% endblock %}">Part 2</a>
    <a href="/practice/3/" class="nav-link {% block nav_p3 %}{% endblock %}">Part 3</a>
  </div>
</nav>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>

<script>
let _toastT;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.className = 'toast', 3000);
}

function getCookie(name) {
  const v = `; ${document.cookie}`.split(`; ${name}=`);
  if (v.length === 2) return v.pop().split(';').shift();
  return null;
}

async function api(method, url, body) {
  const opts = {
    method,
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'request failed');
  return data;
}
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
